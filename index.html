<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Parser</title>
  <style>
    body { font-family: 'Segoe UI', Arial; background: #f4f6f9; margin: 0; }
    header { background: #3498db; color: #fff; padding: 20px; text-align: center; }
    form { margin: 30px auto; padding: 20px; background: #fff; border-radius: 8px;
           max-width: 600px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
    #fileInputWrapper { border: 2px dashed #3498db; padding: 30px; cursor: pointer;
                        border-radius: 8px; margin-bottom: 20px; background: #ecf6fc; }
    input[type="file"] { display: none; }
    button { background: #3498db; color: #fff; border: none; padding: 12px 20px;
             border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #2980b9; }
    #progressContainer { width: 100%; background: #eee; height: 10px; margin-top: 20px; border-radius: 5px; }
    #progressBar { width: 0%; height: 10px; background: #27ae60; transition: width 0.3s ease; }
    #errorDiv, #successDiv { display: none; padding: 12px; margin: 20px auto; max-width: 600px; border-radius: 6px; font-weight: bold; }
    #errorDiv { background: #e74c3c; color: #fff; }
    #successDiv { background: #2ecc71; color: #fff; }
    #resultsSection { display: none; margin: 30px auto; max-width: 600px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    #resultSkills span { margin: 5px; background: #3498db; color: #fff; padding: 5px 10px; border-radius: 4px; display: inline-block; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <header>
    <h1>Resume Parser</h1>
    <p>Upload your resume (PDF) and get structured data instantly</p>
  </header>

  <form id="uploadForm">
    <div id="fileInputWrapper" onclick="document.getElementById('resumeFile').click()">
      <input type="file" id="resumeFile" name="resumeFile" />
      <span id="fileName">Click to browse or drag & drop</span>
    </div>
    <button type="submit">Upload Resume</button>
  </form>

  <div id="progressContainer"><div id="progressBar"></div></div>
  <div id="errorDiv"></div>
  <div id="successDiv"></div>

  <section id="resultsSection">
    <h2>Parsed Resume</h2>
    <p><strong>Name:</strong> <span id="resultName"></span></p>
    <p><strong>Education:</strong> <div id="resultEducation"></div></p>
    <p><strong>Skills:</strong> <div id="resultSkills"></div></p>
    <p><strong>Contact:</strong> <span id="resultContact"></span></p>
    <h3>Raw JSON</h3>
    <pre id="jsonData"></pre>
  </section>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const progressBar = document.getElementById('progressBar');
    const errorDiv = document.getElementById('errorDiv');
    const successDiv = document.getElementById('successDiv');
    const resultsSection = document.getElementById('resultsSection');

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAllAlerts();
      progressBar.style.width = '50%';

      const fileInput = document.getElementById('resumeFile');
      if (!fileInput.files.length) {
        showError('Please select a file to upload.');
        return;
      }

      const formData = new FormData();
      formData.append('resume', fileInput.files[0]); // must match Flask key

      try {
        const response = await fetch('/upload', { method: 'POST', body: formData });
        progressBar.style.width = '100%';

        const contentType = response.headers.get('content-type');
        if (response.ok && contentType.includes('application/json')) {
          const data = await response.json();
          showSuccess('Resume parsed successfully!');
          displayResults(data.data);
        } else {
          showError(`Server error: ${response.status} ${response.statusText}`);
        }
      } catch (error) {
        showError('Error: ' + error.message);
      }
    });

    function displayResults(data) {
      document.getElementById('resultName').textContent = data?.Name || '-';
      document.getElementById('resultEducation').innerHTML = (data?.Education || []).map(e => `<div>${e}</div>`).join('');
      document.getElementById('resultSkills').innerHTML = (data?.Skills || []).map(s => `<span>${s}</span>`).join('');
      document.getElementById('resultContact').textContent = data?.Contact || '-';
      document.getElementById('jsonData').textContent = JSON.stringify(data, null, 2);
      resultsSection.style.display = 'block';
    }
    function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
    function showSuccess(msg) { successDiv.textContent = msg; successDiv.style.display = 'block'; }
    function hideAllAlerts() { errorDiv.style.display = 'none'; successDiv.style.display = 'none'; }
  </script>
</body>
</html>
